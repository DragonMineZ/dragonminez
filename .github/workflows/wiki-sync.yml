name: Trigger AI knowledge sync

on: gollum

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch wiki-updated to dragonminez-ai
        run: |
          curl -sS --fail -X POST \
            -H "Authorization: Bearer ${{ secrets.DRAGONMINEZ_AI_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/DragonMineZ/dragonminez-ai/dispatches \
            -d '{"event_type":"wiki-updated"}'
