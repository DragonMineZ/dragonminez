modLoader="javafml"
loaderVersion="[47,)"
license="${mod_license}"
issueTrackerURL = "https://discord.dragonminez.com"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="dmz_logo.png"
credits="${mod_credits}"
authors="${mod_authors}"
description='''${mod_description}'''
displayTest = "MATCH_VERSION"
displayURL="https://dragonminez.com/"
updateJSONURL="https://raw.githubusercontent.com/DragonMineZ/dragonminez/main/update.json"

[[mixins]]
config="dragonminez.mixins.json"

[[dependencies.dragonminez]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.dragonminez]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.dragonminez]]
    modId="geckolib"
    mandatory=true
    versionRange="${geckolib_version_range}"
    ordering="AFTER"
    side="BOTH"

[[dependencies.dragonminez]]
    modId="terrablender"
    mandatory=true
    versionRange="${terrablender_version_range}"
    ordering="AFTER"
    side="BOTH"

[[dependencies.dragonminez]]
    modId="curios"
    mandatory=true
    versionRange="${curios_version_range}"
    ordering="AFTER"
    side="BOTH"

[[dependencies.dragonminez]]
    modId="legendarytooltips"
    mandatory=false
    versionRange="*"
    ordering="NONE"
    side="BOTH"
    type="incompatible"

[[dependencies.dragonminez]]
    modId="epicfight"
    mandatory=false
    versionRange="*"
    ordering="NONE"
    side="BOTH"
    type="incompatible"

[[dependencies.dragonminez]]
    modId="bettercombat"
    mandatory=false
    versionRange="*"
    ordering="NONE"
    side="BOTH"
    type="incompatible"

